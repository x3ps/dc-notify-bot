name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build package
        run: nix build --print-build-logs

      - name: Run tests
        run: nix develop --command go test -v -count=1 ./...

  docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build Docker image
        run: nix build .#docker --print-build-logs

      - name: Load image
        run: docker load < result

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push
        if: github.event_name == 'push'
        run: |
          IMAGE_ID="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE_ID=$(echo "$IMAGE_ID" | tr '[:upper:]' '[:lower:]')

          docker tag dc-notify-bot:latest "$IMAGE_ID:${{ github.sha }}"
          docker push "$IMAGE_ID:${{ github.sha }}"

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker tag dc-notify-bot:latest "$IMAGE_ID:latest"
            docker push "$IMAGE_ID:latest"
          fi

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            docker tag dc-notify-bot:latest "$IMAGE_ID:${{ github.ref_name }}"
            docker push "$IMAGE_ID:${{ github.ref_name }}"
          fi
